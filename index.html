<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>OatNet - Professional P2P Social Network</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/webrtc-adapter@8.2.3/adapter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webconnect.js@1.2.0/dist/webconnect.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@0.128.0/webtorrent.min.js"></script>

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        [data-bs-theme="dark"] {
            --bs-body-bg: #121212;
            --bs-body-color: #e0e0e0;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            transition: background 0.3s;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255,255,255,0.3);
        }
        [data-bs-theme="dark"] .glass-card {
            background: rgba(30, 30, 40, 0.95);
            border-color: rgba(255,255,255,0.1);
        }
        .navbar-brand {
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.85rem;
        }
        .post-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 24px;
        }
        [data-bs-theme="dark"] .post-card {
            background: #1e1e2e;
            color: #e0e0e0;
        }
        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }
        .avatar-sm { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; }
        .avatar-md { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 5px solid #fff; }
        .reaction-btn {
            border: none;
            background: transparent;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: 500;
            color: #6c757d;
            transition: all 0.2s;
        }
        .reaction-btn:hover, .reaction-btn.active {
            background: #f1f3f5;
            color: #0d6efd;
            transform: scale(1.08);
        }
        [data-bs-theme="dark"] .reaction-btn:hover, [data-bs-theme="dark"] .reaction-btn.active {
            background: #2a2a3a;
        }
        .comment-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 16px;
            margin-top: 12px;
        }
        [data-bs-theme="dark"] .comment-section { background: #25253a; }
        .comment-item {
            background: white;
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 10px;
        }
        [data-bs-theme="dark"] .comment-item { background: #1e1e2e; }
        .comment-input-group {
            border: 1px solid #dee2e6;
            border-radius: 9999px;
            padding: 6px 12px;
            background: white;
        }
        [data-bs-theme="dark"] .comment-input-group {
            border-color: #444;
            background: #2a2a3a;
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            z-index: 1050;
            display: none;
            border-top: 1px solid #dee2e6;
        }
        [data-bs-theme="dark"] .bottom-nav { background: rgba(30,30,40,0.95); border-color: #444; }
        @media (max-width: 992px) {
            .bottom-nav { display: flex; }
            .col-lg-3 { display: none; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(#667eea, #764ba2);
            border-radius: 10px;
        }
    </style>
</head>
<body data-bs-theme="light">

<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1100;"></div>

<!-- Auth Overlay (unchanged) -->
<div id="authOverlay" class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center bg-gradient" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 2000;">

</div>

<!-- Main App -->
<div id="mainApp" class="d-none">
    <div class="container-fluid py-3">
        <!-- Header -->
        <nav class="navbar navbar-expand-lg glass-card mb-4 px-4 py-3">
            <div class="d-flex w-100 align-items-center justify-content-between">
                <h1 class="navbar-brand mb-0">🌐 OatNet</h1>

                    <div class="input-group" style="max-width: 420px;">
                        <input id="feedSearch" type="text" class="form-control rounded-pill" placeholder="Search posts..." aria-label="Search">

        </div>

        <!-- Tabs -->
        <ul class="nav nav-pills nav-fill mb-4 gap-2 bg-white p-2 rounded-5 shadow-sm glass-card" id="mainTabs">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#feedPanel"><i class="bi bi-house-fill"></i><span class="d-none d-md-inline ms-2">Home</span></button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#profilePanel"><i class="bi bi-person-fill"></i><span class="d-none d-md-inline ms-2">Profile</span></button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#chatPanel"><i class="bi bi-chat-fill"></i><span class="d-none d-md-inline ms-2">Chat</span></button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#notificationsPanel"><i class="bi bi-bell-fill"></i><span class="d-none d-md-inline ms-2">Notifications</span></button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#torrentPanel"><i class="bi bi-cloud-arrow-down"></i><span class="d-none d-md-inline ms-2">Torrent</span></button></li>
        </ul>

        <div class="tab-content">
            <!-- Feed Panel (Improved) -->
            <div class="tab-pane fade show active" id="feedPanel">
                <div class="row">
                    <div class="col-lg-8 mx-auto">
                        <!-- Create Post -->
                        <div class="post-card p-4 mb-4">
                            <textarea id="postContent" class="form-control border-0 mb-3" rows="3" placeholder="What's happening in the decentralized world? 🌍" style="resize: none; font-size: 1.05rem;"></textarea>
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <button id="attachMediaBtn" class="btn btn-light rounded-pill"><i class="bi bi-image"></i></button>
                                    <button id="emojiPostBtn" class="btn btn-light rounded-pill ms-2"><i class="bi bi-emoji-smile"></i></button>
                                </div>
                                <button id="publishPostBtn" class="btn btn-primary-gradient px-5 rounded-pill">Post</button>
                            </div>
                            <div id="uploadProgressContainer" class="mt-3 d-none">
                                <div class="progress" style="height: 5px;">
                                    <div id="uploadProgressBar" class="progress-bar bg-gradient" style="width: 0%;"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Feed -->
                        <div id="feedList"></div>
                        <div class="text-center my-4">
                            <button id="loadMoreBtn" class="btn btn-outline-primary rounded-pill px-5">Load more posts</button>
                        </div>
                    </div>

                    <!-- Sidebar -->
                    <div class="col-lg-4 d-none d-lg-block">
                        <div class="post-card p-4 sticky-top" style="top: 20px;">
                            <h6 class="fw-semibold mb-3"><i class="bi bi-people"></i> Online Peers</h6>
                            <div id="onlinePeersList" class="mb-4"></div>
                            <button id="startVideoCallBtn" class="btn btn-danger w-100 rounded-pill">🎥 Start Video Call</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Other panels remain mostly the same, but you can add similar improvements -->
            <!-- Profile, Chat, Notifications (new), Torrent panels... -->
            <!-- For brevity, keep your original panels and just ensure they use .post-card and glass styles -->
        </div>
    </div>

    <!-- Bottom Navigation (Mobile) -->
    <div class="bottom-nav py-2">
        <div class="d-flex justify-content-around text-center">
            <button class="nav-link active border-0 bg-transparent" data-bs-toggle="pill" data-bs-target="#feedPanel"><i class="bi bi-house-fill fs-4"></i></button>
            <button class="nav-link border-0 bg-transparent" data-bs-toggle="pill" data-bs-target="#profilePanel"><i class="bi bi-person-fill fs-4"></i></button>
            <button class="nav-link border-0 bg-transparent" data-bs-toggle="pill" data-bs-target="#chatPanel"><i class="bi bi-chat-fill fs-4"></i></button>
            <button class="nav-link border-0 bg-transparent" data-bs-toggle="pill" data-bs-target="#notificationsPanel"><i class="bi bi-bell-fill fs-4"></i></button>
        </div>
    </div>
</div>

<!-- Video Call Container (unchanged) -->
<div id="videoCallPanel" class="video-chat-container p-3 d-none">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// === Your original variables, auth, P2P, WebTorrent, etc. remain mostly the same ===
// (Paste all your original JS here: currentUser, users, swarm, etc.)

// Improved renderFeed with better comments
function renderFeed(filteredPosts = null) {
    const postsToShow = filteredPosts || allPosts;
    let html = '';
    if (postsToShow.length === 0) {
        html = `<div class="post-card p-5 text-center"><p class="text-muted">No posts found.</p></div>`;
    } else {
        html = postsToShow.map(post => `
            <div class="post-card p-4">
                <div class="d-flex gap-3">
                    <img src="${post.authorAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(post.authorName)}&background=667eea&color=fff`}" class="avatar-sm">
                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between">
                            <div>
                                <strong>${escapeHtml(post.authorName)}</strong>
                                <small class="text-muted ms-2">${new Date(post.timestamp).toLocaleString()}</small>
                            </div>
                            ${post.authorId === currentUser ? `
                                <div class="dropdown">
                                    <button class="btn btn-sm border-0" data-bs-toggle="dropdown"><i class="bi bi-three-dots"></i></button>
                                    <ul class="dropdown-menu">
                                        <li><a class="dropdown-item edit-post" data-id="${post.id}" href="#">Edit</a></li>
                                        <li><a class="dropdown-item text-danger delete-post" data-id="${post.id}" href="#">Delete</a></li>
                                    </ul>
                                </div>
                            ` : ''}
                        </div>
                        <div class="my-3">${escapeHtml(post.content)}</div>
                        ${post.mediaUrl ? (post.mediaType?.startsWith('image') ? `<img src="${post.mediaUrl}" class="img-fluid rounded-4 mb-3" style="max-height:420px;">` : `<video src="${post.mediaUrl}" controls class="w-100 rounded-4 mb-3"></video>`) : ''}
                        
                        <div class="d-flex gap-4 text-muted small">
                            <button class="reaction-btn like-btn ${post.likes?.includes(currentUser) ? 'active' : ''}" data-id="${post.id}">
                                <i class="bi ${post.likes?.includes(currentUser) ? 'bi-heart-fill' : 'bi-heart'}"></i> <span>${post.likes?.length || 0}</span>
                            </button>
                            <button class="reaction-btn comment-toggle" data-id="${post.id}">
                                <i class="bi bi-chat"></i> <span>${post.comments?.length || 0}</span>
                            </button>
                            <button class="reaction-btn share-btn" data-id="${post.id}"><i class="bi bi-share"></i> Share</button>
                        </div>

                        <!-- Improved Comments -->
                        <div class="comment-section mt-3" id="comments-${post.id}">
                            <div id="comments-list-${post.id}" class="mb-3">
                                ${(post.comments || []).map(c => `
                                    <div class="comment-item d-flex gap-3">
                                        <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(c.userName)}&background=667eea&color=fff" class="comment-avatar">
                                        <div class="flex-grow-1">
                                            <strong class="small">${escapeHtml(c.userName)}</strong>
                                            <p class="mb-1 small">${escapeHtml(c.text)}</p>
                                            <small class="text-muted">${new Date(c.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</small>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="comment-input-group d-flex">
                                <input type="text" class="form-control border-0 comment-input flex-grow-1" data-id="${post.id}" placeholder="Write a comment...">
                                <button class="btn btn-sm btn-primary-gradient rounded-pill px-4 add-comment-btn" data-id="${post.id}">Send</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    }
    document.getElementById('feedList').innerHTML = html;
    attachPostEvents();
}

// Better event attachment with delegation
function attachPostEvents() {
    // Likes
    document.querySelectorAll('.like-btn').forEach(btn => {
        btn.onclick = () => likePost(btn.dataset.id, currentUser);
    });

    // Comment toggle + auto open on mobile
    document.querySelectorAll('.comment-toggle').forEach(btn => {
        btn.onclick = () => {
            const section = document.getElementById(`comments-${btn.dataset.id}`);
            if (section) section.style.display = section.style.display === 'none' ? 'block' : 'none';
        };
    });

    // Add comment with Enter key support
    document.querySelectorAll('.comment-input').forEach(input => {
        input.onkeypress = (e) => {
            if (e.key === 'Enter') {
                const btn = document.querySelector(`.add-comment-btn[data-id="${input.dataset.id}"]`);
                if (btn) btn.click();
            }
        };
    });

    document.querySelectorAll('.add-comment-btn').forEach(btn => {
        btn.onclick = () => {
            const input = document.querySelector(`.comment-input[data-id="${btn.dataset.id}"]`);
            if (input && input.value.trim()) {
                addComment(btn.dataset.id, input.value.trim(), currentUser, myProfile.name || currentUser);
                input.value = '';
            }
        };
    });

    // Share & Delete/Edit
    document.querySelectorAll('.share-btn').forEach(btn => {
        btn.onclick = () => {
            const post = allPosts.find(p => p.id == btn.dataset.id);
            if (post) sharePost(post);
        };
    });

    document.querySelectorAll('.delete-post').forEach(btn => {
        btn.onclick = (e) => {
            e.preventDefault();
            if (confirm('Delete this post?')) {
                allPosts = allPosts.filter(p => p.id != btn.dataset.id);
                persistPosts();
                renderFeed();
            }
        };
    });

    // Edit post (simple prompt for demo)
    document.querySelectorAll('.edit-post').forEach(btn => {
        btn.onclick = (e) => {
            e.preventDefault();
            const post = allPosts.find(p => p.id == btn.dataset.id);
            if (post && post.authorId === currentUser) {
                const newContent = prompt('Edit post:', post.content);
                if (newContent !== null) {
                    post.content = newContent;
                    persistPosts();
                    renderFeed();
                }
            }
        };
    });
}

// Add dark mode
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-bs-theme');
    const newTheme = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-bs-theme', newTheme);
    localStorage.setItem('oatnet-theme', newTheme);
    document.getElementById('themeToggle').innerHTML = newTheme === 'dark' ? '<i class="bi bi-sun"></i>' : '<i class="bi bi-moon-stars"></i>';
}

// Search functionality
document.getElementById('feedSearch').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase().trim();
    if (!term) {
        renderFeed();
        return;
    }
    const filtered = allPosts.filter(p => 
        p.content.toLowerCase().includes(term) || 
        p.authorName.toLowerCase().includes(term)
    );
    renderFeed(filtered);
});

// Stories (demo)
function renderStories() {
    const storiesHTML = `
        <div class="text-center mx-2"><img src="https://ui-avatars.com/api/?name=You" class="rounded-circle" width="64" height="64"><small class="d-block mt-1 text-muted">You</small></div>
        <div class="text-center mx-2"><img src="https://picsum.photos/id/64/64" class="rounded-circle" width="64" height="64"><small class="d-block mt-1 text-muted">Alice</small></div>
        <!-- Add more -->
    `;
    document.getElementById('storiesBar').innerHTML = storiesHTML;
}

// Notifications Panel (new simple tab content)
const notificationsPanelHTML = `
    <div class="post-card p-4">
        <h5 class="fw-bold"><i class="bi bi-bell"></i> Notifications</h5>
        <div id="notificationsList" class="mt-3"></div>
    </div>
`;
// You can add it to the tab-content dynamically or hardcode.

// Call these in initAppAfterAuth()
function initAppAfterAuth() {
    // ... your original code ...
    renderFeed();
    renderStories();
    attachPostEvents();
    document.getElementById('themeToggle').onclick = toggleTheme;
    
    // Load saved theme
    const savedTheme = localStorage.getItem('oatnet-theme') || 'light';
    document.documentElement.setAttribute('data-bs-theme', savedTheme);
    document.getElementById('themeToggle').innerHTML = savedTheme === 'dark' ? '<i class="bi bi-sun"></i>' : '<i class="bi bi-moon-stars"></i>';
}

// Your other functions (likePost, addComment, etc.) stay similar but ensure they call renderFeed() after changes.

checkSession();
</script>
</body>
