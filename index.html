            <!-- Profile Panel -->

                                    <button id="editProfileBtn" class="btn btn-outline-primary btn-sm rounded-pill"><i class="bi bi-pencil"></i> Edit Profile</button>
                                    <button id="uploadAvatarBtn" class="btn btn-outline-secondary btn-sm rounded-pill"><i class="bi bi-camera"></i> Change Avatar</button>
                                    <button id="uploadCoverBtn" class="btn btn-outline-secondary btn-sm rounded-pill"><i class="bi bi-image"></i> Change Cover</button>
                                </div>

                        </div>
                        <div class="mt-4">
                            <h5><i class="bi bi-journal-bookmark-fill"></i> My Posts</h5>

            <!-- Chat Panel -->
            <div class="tab-pane fade" id="chatPanel">
                <div class="row">

                        <div class="card rounded-4 p-2">

            <!-- Torrent Panel -->
            <div class="tab-pane fade" id="torrentPanel">

                    <div class="input-group mb-3">
                        <input type="text" id="magnetInput" class="form-control" placeholder="magnet:?xt=urn:btih:... or info hash">
                        <button id="addMagnetBtn" class="btn btn-dark">Add & Stream</button>

                    <div id="torrentFilesList" class="row"></div>

<!-- Floating video chat panel -->
<div id="videoCallPanel" class="video-chat-container p-2">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <strong class="text-white">Video Call Active</strong>
        <button id="closeVideoBtn" class="btn-close btn-close-white"></button>
    </div>
    <video id="localVideo" autoplay muted playsinline class="video-element mb-1" style="height: 140px;"></video>
    <video id="remoteVideo" autoplay playsinline class="video-element" style="height: 140px;"></video>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ---------------------------- WEBAUTHN AUTH SYSTEM ----------------------------
let currentUser = null;
let userCredentials = JSON.parse(localStorage.getItem('webauthn_users') || '{}');

function randomChallenge() { return crypto.getRandomValues(new Uint8Array(32)); }

async function registerWebAuthn(username, email) {
    if(userCredentials[username]) throw new Error('Username already exists');
    const challenge = randomChallenge();
    const publicKeyCredentialCreationOptions = {
        challenge: challenge,
        rp: { name: "OatNet P2P Social", id: window.location.hostname || "localhost" },
        user: { id: new TextEncoder().encode(username), name: username, displayName: username },
        pubKeyCredParams: [{ alg: -7, type: "public-key" }, { alg: -257, type: "public-key" }],
        authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "preferred" },
        timeout: 60000,
        attestation: "none"
    };
    const credential = await navigator.credentials.create({ publicKey: publicKeyCredentialCreationOptions });
    userCredentials[username] = { id: credential.id, email: email, credentialName: username };
    localStorage.setItem('webauthn_users', JSON.stringify(userCredentials));
    return true;
}

async function loginWebAuthn(username) {
    if(!userCredentials[username]) throw new Error('User not found');
    const challenge = randomChallenge();
    const allowCredentials = [{ id: userCredentials[username].id, type: "public-key" }];
    const publicKeyCredentialRequestOptions = { 
        challenge, 
        allowCredentials, 
        timeout: 60000, 
        userVerification: "preferred", 
        rpId: window.location.hostname || "localhost" 
    };
    const assertion = await navigator.credentials.get({ publicKey: publicKeyCredentialRequestOptions });
    if(assertion) return true;
    throw new Error('Authentication failed');
}

function generateOTP() { return Math.floor(100000 + Math.random() * 900000).toString(); }
let pendingReset = null;
function sendOTP(username) {
    if(!userCredentials[username]) throw new Error('User not found');
    let otp = generateOTP();
    pendingReset = { username, otp, expiry: Date.now() + 300000 };
    alert(`[OTP Demo] Your recovery code for ${username} is: ${otp}\n\nIn production, this would be emailed to ${userCredentials[username].email}`);
    return true;
}
async function verifyOTPAndReset(username, otp) {
    if(!pendingReset || pendingReset.username !== username || pendingReset.otp !== otp || Date.now() > pendingReset.expiry) 
        throw new Error('Invalid or expired OTP');
    let email = userCredentials[username].email;
    delete userCredentials[username];
    localStorage.setItem('webauthn_users', JSON.stringify(userCredentials));
    return registerWebAuthn(username, email);
}

function logout() { 
    currentUser = null; 
    localStorage.removeItem('currentSession'); 
    document.getElementById('mainApp').style.display = 'none'; 
    document.getElementById('authOverlay').style.display = 'flex'; 
    if(window.swarm) { try { swarm.destroy(); } catch(e) {} }
}

function checkSession() { 
    let saved = localStorage.getItem('currentSession'); 
    if(saved && userCredentials[saved]) { 
        currentUser = saved; 
        initAppAfterAuth(); 
    } 
}

// ---------------------------- P2P Social Core ----------------------------
let swarm = null, peerConnections = new Map(), onlinePeers = new Set(), allPosts = [], directMessages = {}, myProfile = {};

function loadUserData() { 
    let stored = localStorage.getItem(`p2p_posts_${currentUser}`);
    if(stored) allPosts = JSON.parse(stored);
    let storedDMs = localStorage.getItem(`p2p_messages_${currentUser}`);
    if(storedDMs) directMessages = JSON.parse(storedDMs);
    let profile = localStorage.getItem(`profile_${currentUser}`);
    if(profile) myProfile = JSON.parse(profile);
    else myProfile = { 
        name: currentUser, 
        bio: 'Building a decentralized social network 🌐', 
        avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser)}&background=6366f1&color=fff&size=128`, 
        cover: 'https://picsum.photos/id/104/800/200' 
    };
    saveProfile();
}

function saveProfile() { localStorage.setItem(`profile_${currentUser}`, JSON.stringify(myProfile)); updateProfileUI(); }
function persistPosts() { localStorage.setItem(`p2p_posts_${currentUser}`, JSON.stringify(allPosts)); }
function persistMessages() { localStorage.setItem(`p2p_messages_${currentUser}`, JSON.stringify(directMessages)); }

function addPost(post, broadcast = true) { 
    post.id = post.id || Date.now() + '_' + Math.random(); 
    post.likes = post.likes || []; 
    post.comments = post.comments || []; 
    allPosts.unshift(post); 
    persistPosts(); 
    renderFeed(); 
    renderProfileWall(); 
    if(broadcast && swarm) swarm.send({ type: 'NEW_POST', post: post }); 
}

function likePost(postId, userId) { 
    let post = allPosts.find(p => p.id == postId); 
    if(post) { 
        if(!post.likes.includes(userId)) post.likes.push(userId); 
        else post.likes = post.likes.filter(id => id !== userId); 
        persistPosts(); 
        renderFeed(); 
        renderProfileWall(); 
        if(swarm) swarm.send({ type: 'LIKE_UPDATE', postId, likes: post.likes }); 
    } 
}

function addComment(postId, text, userId, userName) { 
    let post = allPosts.find(p => p.id == postId); 
    if(post && text.trim()) { 
        post.comments.push({ id: Date.now(), userId, userName, text, timestamp: Date.now() }); 
        persistPosts(); 
        renderFeed(); 
        renderProfileWall(); 
        if(swarm) swarm.send({ type: 'COMMENT_UPDATE', postId, comments: post.comments }); 
    } 
}

function sharePost(originalPost) { 
    let newPost = { 
        ...originalPost, 
        id: Date.now() + '_share', 
        authorId: currentUser, 
        authorName: myProfile.name, 
        authorAvatar: myProfile.avatar, 
        repostOf: originalPost.id, 
        timestamp: Date.now(), 
        likes: [], 
        comments: [] 
    }; 
    addPost(newPost, true); 
}

function initP2PSwarm() {
    if(typeof WebConnect === 'undefined') { setTimeout(initP2PSwarm, 500); return; }
    try {
        swarm = new WebConnect(`OatNet-${currentUser}`, { 
            trackers: ['wss://tracker.webtorrent.dev', 'wss://tracker.openwebtorrent.com'], 
            simplepeer: SimplePeer, 
            wrtc: window.RTCPeerConnection 
        });
        swarm.on('peer', (peer, peerId) => { 
            onlinePeers.add(peerId); 
            updatePeerUI(); 
            peer.on('data', data => { 
                try { 
                    let msg = JSON.parse(data.toString()); 
                    handlePeerMessage(msg, peerId); 
                } catch(e) {} 
            }); 
            peer.on('close', () => { 
                onlinePeers.delete(peerId); 
                updatePeerUI(); 
            }); 
            peerConnections.set(peerId, peer); 
            peer.send(JSON.stringify({ type: 'PROFILE_SYNC', profile: myProfile, peerId: currentUser })); 
        });
        swarm.on('peer-disconnected', (peerId) => { 
            onlinePeers.delete(peerId); 
            peerConnections.delete(peerId); 
            updatePeerUI(); 
        });
        window.swarm = swarm;
    } catch(e) { console.error('Swarm error:', e); }
}

function handlePeerMessage(msg, fromPeerId) { 
    if(msg.type === 'PROFILE_SYNC') { 
        if(!window.profileCache) window.profileCache = {}; 
        window.profileCache[msg.peerId] = msg.profile; 
        updatePeerUI(); 
    } else if(msg.type === 'NEW_POST') { 
        if(!allPosts.some(p => p.id === msg.post.id)) { 
            allPosts.unshift(msg.post); 
            persistPosts(); 
            renderFeed(); 
            renderProfileWall(); 
        } 
    } else if(msg.type === 'LIKE_UPDATE') { 
        let post = allPosts.find(p => p.id == msg.postId); 
        if(post) { 
            post.likes = msg.likes; 
            persistPosts(); 
            renderFeed(); 
            renderProfileWall(); 
        } 
    } else if(msg.type === 'COMMENT_UPDATE') { 
        let post = allPosts.find(p => p.id == msg.postId); 
        if(post) { 
            post.comments = msg.comments; 
            persistPosts(); 
            renderFeed(); 
            renderProfileWall(); 
        } 
    } else if(msg.type === 'CHAT_MSG') { 
        if(!directMessages[msg.from]) directMessages[msg.from] = []; 
        directMessages[msg.from].push({ text: msg.text, from: msg.from, timestamp: Date.now(), outgoing: false }); 
        persistMessages(); 
        if(window.currentChatPeer === msg.from) renderChatMessages(msg.from);
        const badge = document.getElementById('chatBadge');
        if(badge) badge.style.display = 'inline-block';
    } 
}

function sendChatMessage() {
    let peerId = window.currentChatPeer;
    let text = document.getElementById('chatInput').value;
    if(!peerId || !text) return alert('Select a peer first');
    if(!peerConnections.has(peerId)) return alert('Peer not connected');
    let msg = { type: 'CHAT_MSG', text: text, from: currentUser };
    peerConnections.get(peerId).send(JSON.stringify(msg));
    if(!directMessages[peerId]) directMessages[peerId] = [];
    directMessages[peerId].push({ text: text, from: currentUser, outgoing: true, timestamp: Date.now() });
    persistMessages();
    renderChatMessages(peerId);
    document.getElementById('chatInput').value = '';
}

// Video call
let videoActive = false, localStream = null, videoPeer = null;
async function startVideoCall(targetPeerId) { 
    if(videoActive) return; 
    try { 
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true }); 
        document.getElementById('localVideo').srcObject = localStream; 
        videoPeer = new SimplePeer({ initiator: true, stream: localStream, trickle: true }); 
        videoPeer.on('signal', data => { 
            if(peerConnections.has(targetPeerId)) 
                peerConnections.get(targetPeerId).send(JSON.stringify({ type: 'VIDEO_OFFER', offer: data })); 
        }); 
        videoPeer.on('stream', remoteStream => { 
            document.getElementById('remoteVideo').srcObject = remoteStream; 
        }); 
        videoPeer.on('close', () => endVideoCall()); 
        document.getElementById('videoCallPanel').style.display = 'block'; 
        videoActive = true; 
        window.videoPeer = videoPeer;
    } catch(e) { alert('Camera access error: ' + e.message); } 
}
function endVideoCall() { 
    if(videoPeer) videoPeer.destroy(); 
    if(localStream) localStream.getTracks().forEach(t=>t.stop()); 
    videoActive=false; 
    document.getElementById('videoCallPanel').style.display='none'; 
    window.videoPeer = null;
}

// WebTorrent - FIXED: Use window.WebTorrent or WebTorrent
let client = null;
function initWebTorrent() {
    if(typeof window.WebTorrent !== 'undefined') {
        client = new window.WebTorrent();
    } else if(typeof WebTorrent !== 'undefined') {
        client = new WebTorrent();
    } else {
        console.error('WebTorrent not loaded yet, retrying...');
        setTimeout(initWebTorrent, 500);
        return;
    }
    window.client = client;
    console.log('WebTorrent initialized');
}
function addTorrent(magnet) { 
    if(!client) { alert('WebTorrent loading...'); return; }
    client.add(magnet, (torrent) => { 
        document.getElementById('torrentFilesList').innerHTML = `<div class="alert alert-success">✅ Loaded: ${torrent.name}</div>`; 
        torrent.files.forEach((file, idx) => { 
            document.getElementById('torrentFilesList').innerHTML += `
                <div class="col-md-6 col-lg-4 mb-3">
                    <div class="card p-2">
                        <i class="bi bi-file-earplay"></i> ${file.name.substring(0, 30)}
                        <small class="text-muted">${(file.length/1e6).toFixed(2)} MB</small>
                        <button class="btn btn-sm btn-outline-primary mt-2 streamBtn" data-idx="${idx}">🎬 Stream</button>
                    </div>
                </div>`; 
        }); 
        document.querySelectorAll('.streamBtn').forEach(btn => { 
            btn.onclick = () => { 
                let idx = parseInt(btn.dataset.idx);
                torrent.files[idx].getBlobURL((err, url) => { 
                    if(url) window.open(url); 
                    else alert('Error streaming file');
                }); 
            }; 
        });
    }); 
}

// UI Rendering
function renderFeed() { 
    let feedDiv = document.getElementById('feedList'); 
    if(!feedDiv) return; 
    if(allPosts.length === 0) {
        feedDiv.innerHTML = '<div class="text-center text-muted p-5">No posts yet. Create the first post!</div>';
        return;
    }
    feedDiv.innerHTML = allPosts.map(post => `
        <div class="card post-card p-3">
            <div class="d-flex gap-2 align-items-start">
                <img src="${post.authorAvatar || 'https://ui-avatars.com/api/?name='+encodeURIComponent(post.authorName)}" class="avatar-sm">
                <div class="flex-grow-1">
                    <div><b>${escapeHtml(post.authorName)}</b> <small class="text-muted">${new Date(post.timestamp).toLocaleString()}</small></div>
                    <div class="mt-2">${escapeHtml(post.content)}</div>
                    ${post.mediaUrl ? (post.mediaType?.startsWith('image') ? `<img src="${post.mediaUrl}" class="img-fluid rounded-3 mt-2" style="max-height: 300px;">` : `<video src="${post.mediaUrl}" controls class="w-100 mt-2 rounded-3"></video>`) : ''}
                    <div class="d-flex gap-3 mt-3">
                        <button class="reaction-btn like-btn" data-id="${post.id}"><i class="bi ${post.likes.includes(currentUser) ? 'bi-hand-thumbs-up-fill text-primary' : 'bi-hand-thumbs-up'}"></i> ${post.likes.length}</button>
                        <button class="reaction-btn comment-toggle" data-id="${post.id}"><i class="bi bi-chat"></i> ${post.comments.length}</button>
                        <button class="reaction-btn share-btn" data-id="${post.id}"><i class="bi bi-share-fill"></i> Share</button>
                    </div>
                    <div class="comment-section mt-2" id="comments-${post.id}" style="display:none;">
                        <div class="comments-list small mb-2">${post.comments.map(c => `<div><b>${escapeHtml(c.userName)}</b>: ${escapeHtml(c.text)}</div>`).join('')}</div>
                        <div class="input-group mt-1">
                            <input type="text" class="form-control form-control-sm comment-input" data-id="${post.id}" placeholder="Write a comment...">
                            <button class="btn btn-sm btn-outline-secondary add-comment" data-id="${post.id}">Post</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `).join(''); 
    attachPostEvents(); 
}

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }

function renderProfileWall() { 
    let wallDiv = document.getElementById('profileWallPosts'); 
    if(wallDiv) {
        let myPosts = allPosts.filter(p => p.authorId === currentUser);
        if(myPosts.length === 0) wallDiv.innerHTML = '<div class="text-muted text-center p-3">No posts yet</div>';
        else wallDiv.innerHTML = myPosts.map(post => `<div class="card p-2"><strong>${escapeHtml(post.content.substring(0, 100))}</strong><br><small>❤️ ${post.likes.length} 💬 ${post.comments.length} 📅 ${new Date(post.timestamp).toLocaleDateString()}</small></div>`).join('');
    }
}

function attachPostEvents() { 
    document.querySelectorAll('.like-btn').forEach(btn => btn.onclick = () => likePost(btn.dataset.id, currentUser)); 
    document.querySelectorAll('.share-btn').forEach(btn => { 
        let post = allPosts.find(p=>p.id == btn.dataset.id); 
        btn.onclick = () => sharePost(post); 
    }); 
    document.querySelectorAll('.comment-toggle').forEach(btn => btn.onclick = () => { 
        let div = document.getElementById('comments-'+btn.dataset.id); 
        if(div) div.style.display = div.style.display==='none'?'block':'none'; 
    }); 
    document.querySelectorAll('.add-comment').forEach(btn => btn.onclick = () => { 
        let inp = document.querySelector(`.comment-input[data-id="${btn.dataset.id}"]`); 
        if(inp.value) addComment(btn.dataset.id, inp.value, currentUser, myProfile.name); 
        inp.value=''; 
    }); 
}

function updatePeerUI() { 
    document.getElementById('peerCount').innerText = onlinePeers.size; 
    let listDiv = document.getElementById('onlinePeersList'); 
    if(listDiv) {
        if(onlinePeers.size === 0) listDiv.innerHTML = '<div class="text-muted">No peers online</div>';
        else listDiv.innerHTML = [...onlinePeers].slice(0,10).map(id => `<div><i class="bi bi-circle-fill text-success small"></i> ${id.substring(0, 12)}</div>`).join('');
    }
    let chatPeerDiv = document.getElementById('chatPeerList'); 
    if(chatPeerDiv) {
        if(onlinePeers.size === 0) chatPeerDiv.innerHTML = '<div class="text-muted p-2">No peers connected</div>';
        else chatPeerDiv.innerHTML = [...onlinePeers].map(id => `<a href="#" class="list-group-item list-group-item-action chat-peer-item" data-peer="${id}"><i class="bi bi-person-circle"></i> ${id.substring(0, 15)}</a>`).join('');
        document.querySelectorAll('.chat-peer-item').forEach(el => el.onclick = (e) => { 
            e.preventDefault();
            window.currentChatPeer = el.dataset.peer; 
            renderChatMessages(el.dataset.peer); 
        });
    }
}

function renderChatMessages(peerId) { 
    let container = document.getElementById('chatMessages'); 
    if(!container) return; 
    let msgs = directMessages[peerId] || []; 
    if(msgs.length === 0) container.innerHTML = '<div class="text-muted text-center p-3">No messages yet</div>';
    else container.innerHTML = msgs.map(m => `<div class="d-flex ${m.outgoing ? 'justify-content-end' : 'justify-content-start'} mb-2"><div class="p-2 rounded-3 ${m.outgoing ? 'bg-primary text-white' : 'bg-light'}">${escapeHtml(m.text)}<br><small class="${m.outgoing ? 'text-white-50' : 'text-muted'}">${new Date(m.timestamp).toLocaleTimeString()}</small></div></div>`).join('');
    container.scrollTop = container.scrollHeight; 
}

function updateProfileUI() { 
    document.getElementById('profileName').innerText = myProfile.name; 
    document.getElementById('profileBio').innerText = myProfile.bio; 
    document.getElementById('profileAvatar').src = myProfile.avatar; 
    document.getElementById('profileCover').src = myProfile.cover; 
}

function uploadFile(file, type) { 
    let reader = new FileReader(); 
    let progDiv = document.getElementById('uploadProgressContainer');
    let progBar = document.getElementById('uploadProgressBar');
    if(progDiv) progDiv.style.display = 'block';
    reader.onprogress = (e) => { if(e.lengthComputable && progBar) { let pct = (e.loaded/e.total)*100; progBar.style.width = pct+'%'; } };
    reader.onload = (ev) => { 
        let url = ev.target.result; 
        if(type === 'avatar') { myProfile.avatar = url; saveProfile(); }
        else if(type === 'cover') { myProfile.cover = url; saveProfile(); }
        else { 
            document.getElementById('postContent').dataset.media = url; 
            document.getElementById('postContent').dataset.mediaType = file.type;
            alert('Media attached!');
        }
        if(progDiv) progDiv.style.display = 'none';
        if(progBar) progBar.style.width = '0%';
    }; 
    reader.readAsDataURL(file); 
}

function initAppAfterAuth() { 
    document.getElementById('authOverlay').style.display = 'none'; 
    document.getElementById('mainApp').style.display = 'block'; 
    loadUserData(); 
    renderFeed(); 
    renderProfileWall(); 
    updateProfileUI(); 
    initP2PSwarm(); 
    initWebTorrent();
    setInterval(() => { renderFeed(); renderProfileWall(); }, 3000); 
}

// Event bindings
document.getElementById('loginBtn').onclick = async () => { 
    let username = document.getElementById('loginUsername').value.trim();
    if(!username) return alert('Enter username'); 
    try { 
        await loginWebAuthn(username); 
        currentUser = username; 
        localStorage.setItem('currentSession', username); 
        initAppAfterAuth(); 
    } catch(e) { alert('Login failed: '+e.message); } 
};

document.getElementById('registerWebAuthnBtn').onclick = async () => { 
    let uname = document.getElementById('regUsername').value.trim(), email = document.getElementById('regEmail').value.trim(); 
    if(!uname || !email) return alert('All fields required'); 
    try { 
        await registerWebAuthn(uname, email); 
        alert('Registration successful! Please login with your passkey.'); 
        document.getElementById('registerForm').style.display='none'; 
        document.getElementById('loginForm').style.display='block'; 
    } catch(e) { alert('Error: '+e.message); } 
};

document.getElementById('showRegisterBtn').onclick = () => { 
    document.getElementById('loginForm').style.display='none'; 
    document.getElementById('registerForm').style.display='block'; 
    document.getElementById('forgotForm').style.display='none'; 
};
document.getElementById('backToLoginBtn').onclick = () => { 
    document.getElementById('registerForm').style.display='none'; 
    document.getElementById('loginForm').style.display='block'; 
    document.getElementById('forgotForm').style.display='none'; 
};
document.getElementById('showForgotBtn').onclick = () => { 
    document.getElementById('loginForm').style.display='none'; 
    document.getElementById('forgotForm').style.display='block'; 
};
document.getElementById('backToLoginFromForgotBtn').onclick = () => { 
    document.getElementById('forgotForm').style.display='none'; 
    document.getElementById('loginForm').style.display='block'; 
};
document.getElementById('sendOtpBtn').onclick = () => { 
    let uname = document.getElementById('forgotUsername').value.trim(); 
    if(!uname) return alert('Enter username');
    try { 
        sendOTP(uname); 
        document.getElementById('otpSection').style.display='block'; 
    } catch(e) { alert(e.message); } 
};
document.getElementById('resetWithOtpBtn').onclick = async () => { 
    let uname = document.getElementById('forgotUsername').value.trim(), otp = document.getElementById('otpCode').value.trim(); 
    if(!uname || !otp) return alert('Enter username and OTP');
    try { 
        await verifyOTPAndReset(uname, otp); 
        alert('Account reset successful! Please login with your new passkey.'); 
        location.reload(); 
    } catch(e) { alert(e.message); } 
};
document.getElementById('logoutBtn').onclick = logout;
document.getElementById('publishPostBtn').onclick = () => { 
    let content = document.getElementById('postContent').value; 
    if(!content.trim()) return alert('Write something!');
    let media = document.getElementById('postContent').dataset.media || null; 
    addPost({ 
        authorId: currentUser, 
        authorName: myProfile.name, 
        authorAvatar: myProfile.avatar, 
        content: content, 
        mediaUrl: media, 
        mediaType: document.getElementById('postContent').dataset.mediaType, 
        likes: [], 
        comments: [], 
        timestamp: Date.now() 
    }, true); 
    document.getElementById('postContent').value = ''; 
    delete document.getElementById('postContent').dataset.media; 
};
document.getElementById('attachMediaBtn').onclick = () => { 
    let inp = document.createElement('input'); 
    inp.type='file'; 
    inp.accept='image/*,video/*'; 
    inp.onchange=e => uploadFile(e.target.files[0], 'post'); 
    inp.click(); 
};
document.getElementById('uploadAvatarBtn').onclick = () => { 
    let inp = document.createElement('input'); 
    inp.type='file'; 
    inp.accept='image/*'; 
    inp.onchange=e => uploadFile(e.target.files[0], 'avatar'); 
    inp.click(); 
};
document.getElementById('uploadCoverBtn').onclick = () => { 
    let inp = document.createElement('input'); 
    inp.type='file'; 
    inp.accept='image/*'; 
    inp.onchange=e => uploadFile(e.target.files[0], 'cover'); 
    inp.click(); 
};
document.getElementById('editProfileBtn').onclick = () => { 
    let n=prompt('Display name', myProfile.name); 
    if(n && n.trim()) myProfile.name = n.trim(); 
    let b=prompt('Bio', myProfile.bio); 
    if(b !== null) myProfile.bio = b; 
    saveProfile(); 
};
document.getElementById('sendChatBtn').onclick = sendChatMessage;
document.getElementById('startVideoCallBtn').onclick = () => { 
    if(onlinePeers.size) startVideoCall([...onlinePeers][0]); 
    else alert('No peers online to call'); 
};
document.getElementById('closeVideoBtn').onclick = endVideoCall;
document.getElementById('addMagnetBtn').onclick = () => { 
    let magnet = document.getElementById('magnetInput').value.trim(); 
    if(magnet) addTorrent(magnet); 
    else alert('Enter a magnet link or info hash');
};

// Create chat badge element if needed
if(!document.getElementById('chatBadge')) {
    let badge = document.createElement('span');
    badge.id = 'chatBadge';
    badge.className = 'badge bg-danger ms-1';
    badge.style.display = 'none';
    badge.innerText = '●';
    let chatTab = document.querySelector('#chat-tab-btn');
    if(chatTab) chatTab.appendChild(badge);
}

checkSession();
